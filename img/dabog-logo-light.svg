  <rect x="64" y="48.5" width="7" height="3" rx="1.5" fill="#10b981"/>
  <!-- Diagonal rays -->
  <rect x="42.5" y="37" width="3" height="7" rx="1.5" fill="#10b981" transform="rotate(-45 44 40.5)"/>
  <rect x="64.5" y="56" width="3" height="7" rx="1.5" fill="#10b981" transform="rotate(-45 66 59.5)"/>
  <rect x="42.5" y="56" width="3" height="7" rx="1.5" fill="#10b981" transform="rotate(45 44 59.5)"/>
  <rect x="64.5" y="37" width="3" height="7" rx="1.5" fill="#10b981" transform="rotate(45 66 40.5)"/>
