<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Stranica nije pronađena | SajtPro</title>
  <meta name="description" content="Stranica koju tražite ne postoji ili je premeštena.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
  <style>
    .notfound-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
    }
    .notfound-code {
      font-size: clamp(120px, 20vw, 220px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-l) 50%, rgba(99,102,241,0.3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.9;
      letter-spacing: -6px;
      margin-bottom: 16px;
      animation: float404 3s ease-in-out infinite;
    }
    @keyframes float404 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .notfound-code { animation: none; }
    }
    .notfound-title {
      font-family: var(--display);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }
    .notfound-title em {
      font-style: italic;
      background: linear-gradient(135deg, var(--accent-l), #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .notfound-desc {
      font-size: 16px;
      color: var(--text-m);
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .notfound-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .notfound-glow {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .notfound-wrap > * {
      position: relative;
      z-index: 1;
    }
    .notfound-links {
      margin-top: 48px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .notfound-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-m);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .notfound-link:hover {
      color: var(--accent-l);
    }
    .notfound-link svg {
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .notfound-link:hover svg {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="notfound-wrap">
    <div class="notfound-glow"></div>
    <div class="notfound-code">404</div>
    <h1 class="notfound-title">Ova stranica <em>ne postoji.</em></h1>
    <p class="notfound-desc">Stranica koju tražite je premeštena, obrisana ili nikada nije ni postojala. Ali ne brinite — lako ćete se vratiti na pravi put.</p>
    <div class="notfound-actions">
      <a href="/" class="btn btn-glow btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Početna stranica
      </a>
      <a href="/kontakt.html" class="btn btn-glass btn-lg">Kontaktirajte nas</a>
    </div>
    <div class="notfound-links">
      <a href="/cenovnik.html" class="notfound-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Cenovnik
      </a>
      <a href="/portfolio.html" class="notfound-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Portfolio
      </a>
      <a href="/o-nama.html" class="notfound-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        O nama
      </a>
      <a href="/kako-radimo.html" class="notfound-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Kako radimo
      </a>
    </div>
  </div>
  <div class="cursor-glow"></div>
  <script src="/main.js"></script>
</body>
</html>
